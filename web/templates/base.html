<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sentinel Strategic Command</title>

    <link
        href="/static/css/style.css"
        rel="stylesheet">

</head>

<body>

<div class="layout-shell">

    <aside class="side-nav">

        <div class="side-brand">

            <div class="side-brand-icon">

                🐺

            </div>

            <div class="side-brand-text">

                SEN

            </div>

        </div>

        <nav class="nav-list">

            {% for item in navigation %}

            <a
                href="{{ item.url }}"
                class="nav-item {% if active_page == item.key %}active{% endif %}">

                <span>

                    {{ item.icon }}

                </span>

                <strong>

                    {{ item.title }}

                </strong>

            </a>

            {% endfor %}

        </nav>

    </aside>

    <div class="app-shell">

        {% block content %}

        {% endblock %}

    </div>

</div>

</body>

</html>
